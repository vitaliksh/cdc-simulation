<script>
// Animated clock waveform
const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

let offset = 0;
const color = getComputedStyle(document.documentElement).getPropertyValue('--muted').trim() || '#A89E84';

function draw() {
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);

  const period = 80;
  const amplitude = h * 0.3;
  const midY = h / 2;
  const high = midY - amplitude;
  const low = midY + amplitude;

  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;

  let x = -period + (offset % period);
  let isHigh = true;

  ctx.moveTo(x, isHigh ? high : low);

  while (x < w + period) {
    const nextX = x + period / 2;
    ctx.lineTo(nextX, isHigh ? high : low);
    isHigh = !isHigh;
    ctx.lineTo(nextX, isHigh ? high : low);
    x = nextX;
  }

  ctx.stroke();
  offset += 0.6;
  requestAnimationFrame(draw);
}

draw();
</script>
